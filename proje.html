<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Projelerim | Arda</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body,html{height:100%; font-family:'Arial'; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0f172a; color:white;}

    /* Partikül arka plan */
    canvas#bgCanvas {
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        z-index:-1;
    }

    h1{margin-bottom:40px;font-size:2.8rem; animation:fadeInUp 1s forwards;}
    .project{
        margin:15px 0; padding:20px 30px; width:350px;
        background:#1e293b; border-radius:12px;
        cursor:pointer; transition:0.3s;
        font-size:1.2rem; animation:fadeInUp 1s forwards;
    }
    .project:hover{
        transform:scale(1.05);
        background:#334155;
    }

    .note{
        margin-top:30px;
        font-size:14px;
        opacity:0.7;
    }

    .back{
        margin-top:20px; text-decoration:none; color:#22c55e; font-weight:bold;
    }

    /* Yazı animasyonu */
    @keyframes fadeInUp {
        from {opacity:0; transform:translateY(20px);}
        to {opacity:1; transform:translateY(0);}
    }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<h1>Projelerim</h1>

<div class="project">Vortex Arena - 2D Parkur Oyunu</div>
<div class="project">Velthoria SMP - Minecraft Sunucusu</div>
<div class="project">Kaynix Project - Minecraft Sunucu Paketleri</div>
<div class="project">Velthoria Launcher - Minecraft Sunucu Başlatıcısı</div>

<p class="note">Not: Tüm projelerim kapatılmış ve arşivimde saklanmaktadır.</p>
<a class="back" href="index.html">← Ana Sayfaya Dön</a>

<script>
/* Basit partikül animasyonu */
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2+1,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
