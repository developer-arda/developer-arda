<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arda | Kişisel Site</title>
<style>
    /* Genel Ayarlar */
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; font-family: 'Arial', sans-serif; overflow:hidden; }

    /* Arka plan gradient animasyonu */
    body {
        background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e293b);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        color:white;
    }

    @keyframes gradientBG {
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    /* Yazı animasyonu */
    .fade-in {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards;
    }
    .fade-in:nth-child(1){ animation-delay: 0.5s; }
    .fade-in:nth-child(2){ animation-delay: 1.2s; }
    .fade-in:nth-child(3){ animation-delay: 2s; }

    @keyframes fadeInUp {
        to {
            opacity:1;
            transform: translateY(0);
        }
    }

    h1 { font-size:3rem; margin-bottom:20px; }
    p { font-size:1.2rem; margin-bottom:40px; }

    .btn {
        padding: 15px 35px;
        font-size: 18px;
        background: #22c55e;
        border:none;
        border-radius:10px;
        cursor:pointer;
        color:white;
        transition:0.3s;
    }

    .btn:hover { background:#16a34a; transform:scale(1.1); }
</style>
</head>
<body>

<h1 class="fade-in">Merhaba Ben Arda</h1>
<p class="fade-in">12 Yaşında Yazılım Yapıyorum</p>

<a href="proje.html">
    <button class="btn fade-in">Projelerime Git</button>
</a>

</body>
</html>
